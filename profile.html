<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的主页 - 栖园 Campus</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/home.css" />

</head>
<body>
    <header class="navbar" id="app-navbar"></header>

    <main class="page-wrapper">
        <div class="container">
            <div id="profile-root"></div>

            <div class="profile-tabs" id="profile-tabs">

                <button data-tab="favorites">⭐ 我的收藏</button>

                <button data-tab="edit">⚙️ 编辑资料</button>
            </div>

            <div id="tab-content"></div>
        </div>
    </main>

    <footer class="footer" id="app-footer"></footer>

    <script src="js/storage.js"></script>
    <script src="js/seed.js"></script>
    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>
    <script>UI.initPage('profile');</script>

</html>
